<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carousel manual</title>
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./css/casousel.css" />
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="slider">
      <div class="title text-white fw-medium">BMW</div>
      <img
        src="https://plus.unsplash.com/premium_photo-1664303847960-586318f59035?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8Y2FyfGVufDB8fDB8fHww"
      />
    </div>

    <div class="slider">
      <div class="title text-white fw-medium">HUNDAI</div>
      <img
        src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8Y2FyfGVufDB8fDB8fHww"
      />
    </div>

    <div class="slider">
      <div class="title text-white fw-medium">FARARI</div>
      <img
        src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTR8fGNhcnxlbnwwfHwwfHx8MA%3D%3D"
      />
    </div>

    <div class="icons-sym d-flex gap-1">
      <div class="dot">
        <i class="fa-regular fa-circle-dot" onclick="currentSlide(1)"></i>
      </div>
      <div class="dot">
        <i class="fa-regular fa-circle-dot" onclick="currentSlide(2)"></i>
      </div>
      <div class="dot">
        <i class="fa-regular fa-circle-dot" onclick="currentSlide(3)"></i>
      </div>
    </div>

    <div class="d-flex justify-content-center gap-5 mt-3">
      <a onclick="moveRight(1)"
        ><i class="fa-solid fa-chevron-left fs-5"></i
      ></a>
      <a onclick="moveLeft(-1)"
        ><i class="fa-solid fa-chevron-right fs-5"></i
      ></a>
    </div>

    

    <script src="./node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <script src="./JS/carousel.js"></script>
  </body>
</html>
